name: Tauri Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-desktop:
    name: Verify Desktop Package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files
        id: check
        run: |
          READY=true
          for f in \
            "packages/desktop/Cargo.toml" \
            "packages/desktop/tauri.conf.json" \
            "packages/desktop/src/main.rs" \
            "packages/desktop/src/lib.rs" \
            "packages/desktop/build.rs" \
            "packages/desktop/icons/icon.png" \
            "packages/desktop/icons/icon.ico"; do
            if [ ! -s "$f" ]; then
              echo "::warning::Required file missing or empty: $f"
              READY=false
            fi
          done
          echo "ready=$READY" >> "$GITHUB_OUTPUT"
          if [ "$READY" = "false" ]; then
            echo "::error::Desktop package is not ready for build"
            exit 1
          fi
          echo "All required desktop files present."

      - name: Validate tauri.conf.json
        run: |
          IDENTIFIER=$(node -e "const c = require('./packages/desktop/tauri.conf.json'); console.log(c.identifier)")
          if [ -z "$IDENTIFIER" ]; then
            echo "::error::tauri.conf.json missing identifier"
            exit 1
          fi
          echo "Bundle identifier: $IDENTIFIER"
          TARGETS=$(node -e "const c = require('./packages/desktop/tauri.conf.json'); console.log(c.bundle.targets.join(', '))")
          echo "Bundle targets: $TARGETS"

  build:
    name: Build ${{ matrix.platform.label }}
    needs: check-desktop
    if: needs.check-desktop.outputs.ready == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: Linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - label: Windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'packages/desktop -> target'
          key: ${{ matrix.platform.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Determine release tag
        id: release-info
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building release for tag: $TAG"

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/desktop
          tauriScript: pnpm --filter @scp-os/desktop tauri
          tagName: ${{ steps.release-info.outputs.tag }}
          releaseName: 'SCP-OS ${{ steps.release-info.outputs.tag }}'
          releaseBody: |
            ## SCP Foundation Terminal ${{ steps.release-info.outputs.tag }}

            ### 🖥️ Desktop Application

            Cross-platform desktop client built with Tauri v2.

            ### 📦 Installation

            - **Linux (Debian/Ubuntu)**: Download the `.deb` file → `sudo dpkg -i *.deb`
            - **Linux (Universal)**: Download the `.AppImage` file → `chmod +x *.AppImage && ./SCP-OS*.AppImage`
            - **Windows**: Download the `.msi` or `.exe` installer

            ### 🔐 Verification

            All builds are produced by GitHub Actions from source code in this repository.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform.args }}
          retryAttempts: 2

      - name: Report build artifacts
        if: success()
        shell: bash
        run: |
          echo "::group::Build artifacts for ${{ matrix.platform.label }}"
          if [ -d "packages/desktop/target/release/bundle" ]; then
            find packages/desktop/target/release/bundle -type f \( -name '*.deb' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.nsis.zip' \) -exec ls -lh {} \;
          else
            echo "No bundle directory found - artifacts may have been uploaded directly by tauri-action"
          fi
          echo "::endgroup::"

  notify-failure:
    name: Notify Build Failure
    if: failure() && needs.check-desktop.outputs.ready == 'true'
    needs: [check-desktop, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report failure
        run: |
          echo "::error::Tauri build failed for one or more platforms."
          echo "Trigger: ${{ github.event_name }}"
          echo "Tag: ${{ github.event.inputs.tag || github.ref_name }}"
          echo ""
          echo "Please check the individual platform build logs for details."
          echo "Common failure causes:"
          echo "  - Missing system dependencies"
          echo "  - Rust compilation errors"
          echo "  - Apple signing credential issues (macOS)"
          echo "  - Frontend build failures"
